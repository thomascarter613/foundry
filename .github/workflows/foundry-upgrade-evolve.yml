name: Foundry Upgrade Evolve Verification

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  foundry-upgrade-evolve-plans:
    name: Foundry upgrade/evolve plan gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure verification scripts are executable
        run: |
          chmod +x tools/scripts/*.sh

      - name: Run Foundry upgrade/evolve plan gate
        run: tools/scripts/check-foundry-upgrade-evolve-plans.sh

      - name: Print Foundry upgrade/evolve plan summary
        if: always()
        run: |
          if [ -f .artifacts/foundry/upgrade-evolve-plans/summary.json ]; then
            cat .artifacts/foundry/upgrade-evolve-plans/summary.json
          fi

      - name: Print upgrade plan summary
        if: always()
        run: |
          if [ -f .artifacts/foundry/upgrade-plan/summary.json ]; then
            cat .artifacts/foundry/upgrade-plan/summary.json
          fi

      - name: Print evolve plan summary
        if: always()
        run: |
          if [ -f .artifacts/foundry/evolve-plan/summary.json ]; then
            cat .artifacts/foundry/evolve-plan/summary.json
          fi

      - name: Upload Foundry upgrade/evolve artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundry-upgrade-evolve-artifacts
          path: |
            .artifacts/foundry/upgrade-evolve-baseline
            .artifacts/foundry/upgrade-evolve-plans
            .artifacts/foundry/upgrade-plan
            .artifacts/foundry/evolve-plan
            .artifacts/foundry/upgrade
            .artifacts/foundry/evolve
          if-no-files-found: warn
