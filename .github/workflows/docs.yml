name: Docs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-docs:
    name: Verify documentation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Verify docs
        run: bun run verify:docs
